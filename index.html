<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy Birthday 🎂</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
      * { cursor: none !important; }
      html { scroll-behavior: smooth; }
      body { background: #0a0a0a; overflow-x: hidden; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #0a0a0a; }
      ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #FFC300, #FFD700); border-radius: 2px; }
      #cursor { width: 12px; height: 12px; background: #FFC300; border-radius: 50%; position: fixed; pointer-events: none; z-index: 99999; transform: translate(-50%,-50%); transition: transform 0.1s; mix-blend-mode: difference; }
      #cursor-ring { width: 36px; height: 36px; border: 1px solid rgba(255,195,0,0.5); border-radius: 50%; position: fixed; pointer-events: none; z-index: 99998; transform: translate(-50%,-50%); transition: all 0.15s ease; }
      .swiper-pagination-bullet { background: #FFC300 !important; }
      .swiper-pagination-bullet-active { background: #FFD700 !important; width: 24px !important; border-radius: 4px !important; }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      const cursor = document.getElementById('cursor');
      const ring = document.getElementById('cursor-ring');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        setTimeout(() => {
          ring.style.left = e.clientX + 'px';
          ring.style.top = e.clientY + 'px';
        }, 80);
      });
      document.addEventListener('mousedown', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1.8)';
        ring.style.transform = 'translate(-50%,-50%) scale(0.7)';
      });
      document.addEventListener('mouseup', () => {
        cursor.style.transform = 'translate(-50%,-50%) scale(1)';
        ring.style.transform = 'translate(-50%,-50%) scale(1)';
      });
    </script>
  </body>
</html>
